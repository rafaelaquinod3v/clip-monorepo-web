<h1>{{fileName}}</h1>

<!-- El contenedor real que ve el usuario -->
<div class="controls">
    <button [disabled]="pageHistory.length === 0" (click)="prev()">prev</button>
    <button [disabled]="currentPageStart() >= allPhrases.length" (click)="next()">next</button>
</div>
<div #mainReader class="reader-style" [innerHTML]="content()"></div>

<!-- El contenedor "fantasma" para cálculos (oculto) -->
<div #ghost class="reader-style ghost-hidden"></div>
