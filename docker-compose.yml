services:

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro
    ports:
      - "8880:8880"
    shm_size: '2gb' # IMPORTANT: PyTorch needs shared memory
    deploy:
      resources:
        limits:
          memory: 4G  # Give it enough room to breathe
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: pgvector/pgvector:pg15  # O la versión más reciente disponible en 2026
    container_name: postgres_local
    environment:
      POSTGRES_DB: clip
      POSTGRES_USER: clip_user
      POSTGRES_PASSWORD: clip_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_local
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
volumes:
  ollama_data:
  postgres_data:
