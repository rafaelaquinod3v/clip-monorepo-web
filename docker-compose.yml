services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    #container_name: kokoro_local
    #ports:
    #  - "8880:8880"
    shm_size: '2gb' # IMPORTANT: PyTorch needs shared memory
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 3G  # Give it enough room to breathe
    restart: no #unless-stopped

  nginx:
    image: nginx
    container_name: nginx_local
    ports:
      - "8880:80"
    depends_on:
      - kokoro-tts
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_local
    restart: no #unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: pgvector/pgvector:pg15  # O la versión más reciente disponible en 2026
    container_name: postgres_local
    restart: no #unless-stopped
    environment:
      POSTGRES_DB: clip
      POSTGRES_USER: clip_user
      POSTGRES_PASSWORD: clip_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_local
    restart: no #unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
volumes:
  ollama_data:
  postgres_data:
