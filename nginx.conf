events {
    worker_connections 1024;
}

http {
    upstream kokoro_cluster {
        least_conn;
        server kokoro-tts:8880;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://kokoro_cluster;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_http_version 1.1;
        }
    }
}