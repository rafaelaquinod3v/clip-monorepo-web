<div class="libro-container">
  <!-- El texto se divide en palabras para poder resaltarlas -->
  <p>
    @for(palabra of palabrasLibro; track $index) {
        <span 
          [id]="'word-' + $index"
          [class.highlight]="$index === indicePalabraActiva">
            {{ palabra }} 
        </span>
    }
  </p>

  <button (click)="comenzarLectura()">Leer Libro</button>
  
  <!-- El elemento de audio es invisible, lo controlamos por código -->
  <audio #audioPlayer (timeupdate)="sincronizarTexto($event)"></audio>
</div>

<hr>
<h2>upload</h2>
<input type="file" (change)="onFileSelected($event)" accept=".epub,.pdf,application/epub+zip,application/pdf">
<button (click)="onUpload()" [disabled]="!selectedFile">Subir Ebook</button>
