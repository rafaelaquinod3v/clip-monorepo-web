@if(mediaTypes.includes('EPUB') || mediaTypes.includes('PDF')) {
    <section class="media">
    @for(item of mediaContentShelfItems(); track item.id) {
        @if(mediaTypes.includes(item.mediaType)) {
            <div class="card">
                <a [routerLink]="['/library/' + item.mediaType.toLowerCase(), item.fileName]">
                    {{ getDisplayTitle(item) }}
                </a>
            </div>
        }
    }
    </section>
}
